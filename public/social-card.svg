<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Groove Metronome</title>
  <desc id="desc">Online metronome for beat maps, polyrhythm, polymeter, practice tools, and audio MIDI analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080b17"/>
      <stop offset="0.58" stop-color="#11182d"/>
      <stop offset="1" stop-color="#062326"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="53%">
      <stop offset="0" stop-color="#4deee0" stop-opacity="0.26"/>
      <stop offset="0.72" stop-color="#4deee0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity="0.14">
    <path d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200M0 480H1200M0 576H1200" stroke="#b7c1ff" stroke-width="1"/>
    <path d="M96 0V630M192 0V630M288 0V630M384 0V630M480 0V630M576 0V630M672 0V630M768 0V630M864 0V630M960 0V630M1056 0V630" stroke="#b7c1ff" stroke-width="1"/>
  </g>
  <g transform="translate(756 118)">
    <circle cx="180" cy="180" r="162" fill="#101525" stroke="#d8dcff" stroke-opacity="0.38" stroke-width="3"/>
    <path d="M180 18A162 162 0 0 1 342 180H180Z" fill="#facc15" opacity="0.82"/>
    <path d="M342 180A162 162 0 0 1 180 342V180Z" fill="#45d483" opacity="0.78"/>
    <path d="M180 342A162 162 0 0 1 18 180H180Z" fill="#ff4f8b" opacity="0.78"/>
    <path d="M18 180A162 162 0 0 1 180 18V180Z" fill="#4deee0" opacity="0.2"/>
    <circle cx="180" cy="180" r="76" fill="#080b17" stroke="#d8dcff" stroke-opacity="0.32"/>
    <line x1="180" y1="180" x2="180" y2="36" stroke="#facc15" stroke-width="5" stroke-linecap="round" filter="url(#soft)"/>
    <line x1="180" y1="180" x2="180" y2="36" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(78 102)">
    <text x="0" y="0" fill="#f7f0d2" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700">Groove</text>
    <text x="0" y="84" fill="#f7f0d2" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700">Metronome</text>
    <text x="2" y="158" fill="#4deee0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="3">BEAT MAPS · POLYRHYTHM · POLYMETER</text>
    <text x="2" y="216" fill="#d8dcff" font-family="Arial, Helvetica, sans-serif" font-size="31">A precise online metronome for serious practice,</text>
    <text x="2" y="256" fill="#d8dcff" font-family="Arial, Helvetica, sans-serif" font-size="31">setlists, audio tempo, and MIDI analysis.</text>
    <text x="2" y="370" fill="#facc15" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">metronome.nathanielschool.com</text>
  </g>
</svg>
